<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Payment Failed · FlitzGrip</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="assets/images/logo.png">
</head>
<body>

  <nav class="nav scrolled" id="nav">
    <a href="index.html" class="nav-logo">
      <img src="assets/images/logo.png" alt="FlitzGrip Logo">
      <span>Flitz<em>Grip</em><sup class="tm">™</sup></span>
    </a>
  </nav>

  <main>
    <div class="status-page">
      <div class="container">
        <div class="status-card">
          <div class="status-icon status-icon--failed">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </div>
          <h1>Payment failed.</h1>
          <p>Something went wrong with your payment. You haven't been charged. Please try again.</p>

          <div class="status-actions">
            <a href="buy.html" class="btn btn-primary">Try again</a>
            <a href="index.html" class="btn btn-outline">Back to home</a>
          </div>

          <p style="color:var(--dim);font-size:0.82rem;margin-top:2rem">
            Need help? <a href="mailto:hello@flitzgrip.de" style="color:var(--blue)">hello@flitzgrip.de</a>
          </p>
        </div>
      </div>
    </div>
  </main>

  <script src="js/main.js"></script>
  <script src="js/i18n.js"></script>
</body>
</html>
