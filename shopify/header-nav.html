<!--
  FlitzGrip — Shopify Header Nav
  ─────────────────────────────────────────────────────────────────────────────
  HOW TO INSTALL
  1. Shopify Admin → Online Store → Themes → (your theme) → Edit code
  2. Open sections/header.liquid
  3. Paste this entire block at the very top of that file (line 1)
  4. Save — the nav appears above the Horizon theme header

  NOTE: The Horizon theme header will still be visible below this bar.
  To hide it, go to the Theme Customizer and remove the default Header section,
  or set its height to 0 in theme settings.
  ─────────────────────────────────────────────────────────────────────────────
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
  /* ── Reset for this nav only ── */
  .fg-nav, .fg-nav * { box-sizing: border-box; margin: 0; padding: 0; }

  .fg-nav {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: rgba(12,12,12,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid #272727;
    padding: 0.75rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    font-family: 'Roboto', sans-serif;
  }

  /* ── Logo ── */
  .fg-nav-logo {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    text-decoration: none;
    font-family: 'Roboto', sans-serif;
    font-weight: 700;
    font-size: 1.65rem;
    letter-spacing: 0.04em;
    flex-shrink: 0;
  }
  .fg-nav-logo img {
    height: 52px;
    width: auto;
    filter: invert(1) brightness(0) invert(1);
    object-fit: contain;
  }
  .fg-nav-logo span { color: #FFFFFF; }
  .fg-nav-logo em { font-style: normal; color: #FFFFFF; }
  .fg-nav-logo sup {
    font-size: 0.46em;
    vertical-align: 0.85em;
    font-weight: 400;
    letter-spacing: 0;
    opacity: 0.55;
  }

  /* ── Links ── */
  .fg-nav-links {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    list-style: none;
    margin-left: auto;
  }
  .fg-nav-links a {
    font-family: 'Roboto', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #F0EFED;
    opacity: 0.7;
    text-decoration: none;
    transition: opacity 0.2s, color 0.2s;
  }
  .fg-nav-links a:hover { opacity: 1; color: #FFFFFF; }

  /* ── Shop CTA pill ── */
  .fg-nav-cta {
    background: #29ABE2 !important;
    color: #FFFFFF !important;
    opacity: 1 !important;
    padding: 0.5rem 1.25rem !important;
    border-radius: 6px !important;
    font-weight: 600 !important;
    transition: background 0.2s !important;
  }
  .fg-nav-cta:hover { background: #1A7EAA !important; }

  /* ── Cart icon ── */
  .fg-nav-cart {
    display: flex;
    align-items: center;
    position: relative;
    color: #F0EFED;
    opacity: 0.7;
    text-decoration: none;
    transition: opacity 0.2s;
    padding: 2px;
  }
  .fg-nav-cart:hover { opacity: 1; }
  .fg-nav-cart svg { width: 20px; height: 20px; display: block; }

  .fg-cart-badge {
    position: absolute;
    top: -4px;
    right: -6px;
    background: #29ABE2;
    color: #FFFFFF;
    font-family: 'Roboto', sans-serif;
    font-size: 0.58rem;
    font-weight: 700;
    line-height: 1;
    min-width: 16px;
    height: 16px;
    border-radius: 99px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 3px;
  }

  /* ── Mobile ── */
  @media (max-width: 768px) {
    .fg-nav { padding: 0.75rem 1.25rem; }
    .fg-nav-links li:not(:last-child) { display: none; }
  }
</style>

<nav class="fg-nav">
  <a href="https://www.flitzgrip.com" class="fg-nav-logo">
    <img
      src="{{ 'logo.png' | asset_url }}"
      alt="FlitzGrip Logo"
      width="52"
      height="52"
    >
    <span>Flitz<em>Grip</em><sup>™</sup></span>
  </a>

  <ul class="fg-nav-links">
    <li><a href="https://www.flitzgrip.com/#product">Product</a></li>
    <li><a href="https://www.flitzgrip.com/#ingredients">Ingredients</a></li>
    <li><a href="https://www.flitzgrip.com/#about">About</a></li>
    <li><a href="{{ routes.root_url }}" class="fg-nav-cta">Shop</a></li>
  </ul>

  <a href="{{ routes.cart_url }}" class="fg-nav-cart" aria-label="Cart ({{ cart.item_count }} items)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
      <line x1="3" y1="6" x2="21" y2="6"/>
      <path d="M16 10a4 4 0 0 1-8 0"/>
    </svg>
    {% if cart.item_count > 0 %}
      <span class="fg-cart-badge">{{ cart.item_count }}</span>
    {% endif %}
  </a>
</nav>
